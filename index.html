<!DOCTYPE html>
<html>
<head>
    <title>EVRoute</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { margin: 0; font-family: Arial; }

        #map {
            position: absolute;
            right: 0;
            top: 0;
            width: calc(100% - 320px);
            height: 100vh;
            z-index: 1;
        }

        #panel {
            position: absolute;
            left: 0;
            top: 0;
            width: 320px;
            height: 100%;
            background: #111827;
            color: white;
            padding: 20px;
            z-index: 1000;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        input {
            background: #1f2937;
            color: white;
        }

        button {
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .station {
            background: #1f2937;
            padding: 10px;
            margin-top: 12px;
            border-radius: 8px;
        }

        .route-btn {
            background: #3b82f6;
        }
    </style>
</head>

<body>

<div id="panel">
    <h2>EV Route</h2>

    <div style="display: flex; gap: 10px; align-items: center;">
        <input id="city" placeholder="Enter location or city" style="margin-top: 10px;">
        <button id="mic-btn" type="button" style="width: 50px; margin-top: 10px; background: #3b82f6;" title="Speak City">🎤</button>
        <button id="location-btn" type="button" onclick="useMyLocation()" style="width: 50px; margin-top: 10px; background: #f59e0b;" title="Use My Location">📍</button>
    </div>
    <input id="battery" type="number" placeholder="Battery %">

    <button onclick="findStations()">Find Stations</button>

    <div id="results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
