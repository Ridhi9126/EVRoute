<!DOCTYPE html>
<html>
<head>
    <title>EV Finder</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { font-family: Arial; text-align: center; }
        #map { height: 500px; margin-top: 10px; }
    </style>
</head>
<body>

<h2>EV Charging Station Finder</h2>

<!-- ✅ FORM (IMPORTANT) -->
<form id="route-form">
    <div style="display: inline-flex; gap: 10px; align-items: center; justify-content: center;">
        <input type="text" id="city-input" placeholder="Enter location or city" required>
        <button type="button" id="mic-btn-map" style="width: 40px; cursor: pointer; padding: 5px; border-radius: 5px; background: #3b82f6; color: white; border: none;" title="Speak City">🎤</button>
        <button type="button" id="location-btn-map" onclick="useMyLocation()" style="width: 40px; cursor: pointer; padding: 5px; border-radius: 5px; background: #f59e0b; color: white; border: none;" title="Use My Location">📍</button>
    </div>
    <br><br>

    <input type="number" id="battery-input" placeholder="Battery %" required>
    <br><br>

    <button type="submit">Find Stations</button>
</form>
<div id="error-msg" style="color:red; display:none;"></div>

<!-- OUTPUT -->
<div id="dynamic-results"></div>

<!-- MAP -->
<div id="map"></div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
